<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Prototype</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        /* US 550: Always visible header */
        header { background: #003366; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        /* US 542: Main navigation */
        nav a { color: white; text-decoration: none; margin: 0 10px; cursor: pointer; }
        /* US 536: Search slot */
        .search-bar { padding: 5px; width: 250px; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        /* US 604: Cover display */
        .product-cover { max-width: 100%; height: auto; margin-bottom: 10px; }
        .price { font-weight: bold; color: #d9534f; font-size: 1.2em; }
        .biblio { font-size: 0.85em; color: #555; }
        .auth-form { background: white; padding: 20px; max-width: 300px; margin: auto; border-radius: 5px; }
        .auth-form input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { background: #003366; color: white; border: none; padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h2>MyStore</h2>
            <nav>
                <a @click="currentView = 'home'">Home</a>
                <a @click="currentView = 'login'" v-if="!isLoggedIn">Login Centre</a>
                <a @click="logout" v-else>Logout</a>
            </nav>
            <div>
                <input type="text" v-model="searchQuery" @keyup.enter="search" placeholder="Search products..." class="search-bar">
                <button @click="search">Search</button>
            </div>
        </header>

        <div class="container">
            <div v-if="currentView === 'home'">
                <h3>{{ searchQuery ? 'Search Results' : 'Featured Products' }}</h3>
                <div class="product-grid">
                    <div class="product-card" v-for="product in products" :key="product.id">
                        <img :src="product.cover_url" alt="Cover" class="product-cover">
                        <h4>{{ product.title }}</h4>
                        <div class="biblio">Author: {{ product.author }}<br>ISBN: {{ product.isbn }}</div>
                        <p class="price">€{{ product.price.toFixed(2) }}</p>
                    </div>
                </div>
            </div>

            <div v-if="currentView === 'login'" class="auth-form">
                <h3>Login Centre</h3>
                <input type="email" v-model="auth.email" placeholder="e-mail address">
                <input type="password" v-model="auth.password" placeholder="password">
                <button @click="login">Login</button>
                <p style="font-size: 0.8em; text-align: center;"><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    currentView: 'home',
                    products: [],
                    searchQuery: '',
                    isLoggedIn: false,
                    auth: { email: '', password: '' }
                }
            },
            methods: {
                async fetchProducts() {
                    const res = await fetch('/api/products');
                    this.products = await res.json();
                },
                async search() {
                    if (!this.searchQuery) return this.fetchProducts();
                    const res = await fetch(`/api/search?q=${this.searchQuery}`);
                    this.products = await res.json();
                },
                async login() {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.auth)
                    });
                    if(res.ok) {
                        this.isLoggedIn = true;
                        this.currentView = 'home';
                        alert("Login successful!");
                    } else {
                        alert("Invalid credentials. Try any email/password combo.");
                    }
                },
                logout() {
                    this.isLoggedIn = false;
                    this.auth = { email: '', password: '' };
                }
            },
            mounted() {
                this.fetchProducts();
            }
        }).mount('#app')
    </script>
</body>
</html>
